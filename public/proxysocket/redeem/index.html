<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProxySocket — Recover License Key</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #111318; --bg-card: #181c24; --bg-input: #1a1e28;
    --accent: #5dcaa5; --accent-dim: rgba(93,202,165,0.12); --accent-border: rgba(93,202,165,0.35);
    --border: rgba(255,255,255,0.08); --border-hover: rgba(255,255,255,0.14);
    --text: #f0f0f0; --text-muted: rgba(255,255,255,0.45); --text-dim: rgba(255,255,255,0.25);
    --red: #f87171; --green: #4ade80; --green-dim: rgba(74,222,128,0.1); --green-border: rgba(74,222,128,0.35);
    --radius: 14px; --radius-sm: 10px;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Geist', system-ui, sans-serif; font-size: 15px; line-height: 1.6; -webkit-font-smoothing: antialiased; min-height: 100vh; }
  a { color: inherit; text-decoration: none; }

  nav { display: flex; align-items: center; justify-content: space-between; padding: 18px 24px; border-bottom: 1px solid var(--border); }
  .nav-logo { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 17px; }
  .nav-logo-icon { width: 32px; height: 32px; border-radius: 9px; background: var(--accent-dim); border: 1px solid var(--accent-border); display: flex; align-items: center; justify-content: center; }
  .nav-logo-icon svg { width: 15px; height: 15px; stroke: var(--accent); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .nav-back { font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 5px; transition: color .2s; }
  .nav-back:hover { color: var(--text); }
  .nav-back svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  .container { max-width: 460px; margin: 0 auto; padding: 52px 24px 80px; }

  .hero { text-align: center; margin-bottom: 36px; }
  .hero-label { font-size: 11px; font-weight: 600; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; }
  .hero h1 { font-size: 28px; font-weight: 700; letter-spacing: -.5px; margin-bottom: 10px; }
  .hero p { font-size: 14px; color: var(--text-muted); line-height: 1.65; }

  .lookup-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px 24px; margin-bottom: 24px; }
  .lookup-label { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; }
  input { width: 100%; padding: 13px 16px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg-input); color: var(--text); font-size: 14px; font-family: inherit; outline: none; transition: border-color .2s; margin-bottom: 12px; }
  input::placeholder { color: var(--text-dim); }
  input:focus { border-color: var(--accent-border); }
  .btn-primary { width: 100%; padding: 14px; background: var(--accent); color: #000; font-size: 15px; font-weight: 700; border: none; border-radius: var(--radius-sm); cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 8px; transition: opacity .15s; }
  .btn-primary:hover { opacity: 0.88; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

  .error-msg { color: var(--red); font-size: 13px; text-align: center; margin-top: 12px; display: none; }

  /* Spinner */
  .spinner-wrap { text-align: center; padding: 32px 0; display: none; }
  .spinner { width: 36px; height: 36px; border: 2px solid rgba(93,202,165,0.15); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Results */
  .results { display: none; }
  .results-title { font-size: 13px; color: var(--text-muted); margin-bottom: 14px; }

  .key-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 12px; }
  .key-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .plan-tag { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 999px; background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent-border); }
  .expiry-tag { font-size: 11px; color: var(--text-dim); }
  .expiry-tag.expired { color: var(--red); }
  .key-value { font-family: 'Courier New', monospace; font-size: 17px; font-weight: 700; letter-spacing: 2px; color: var(--green); margin-bottom: 14px; word-break: break-all; }
  .key-value.expired { color: var(--text-dim); text-decoration: line-through; }
  .copy-btn { width: 100%; padding: 10px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: rgba(255,255,255,0.04); color: var(--text-muted); font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all .15s; }
  .copy-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }
  .copy-btn.copied { border-color: var(--green-border); background: var(--green-dim); color: var(--green); }
  .copy-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .copy-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .no-keys { text-align: center; padding: 32px 0; }
  .no-keys svg { width: 40px; height: 40px; stroke: var(--text-dim); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; margin-bottom: 14px; }
  .no-keys p { font-size: 14px; color: var(--text-muted); line-height: 1.65; }
  .no-keys a { color: var(--accent); }

  .try-again { display: flex; align-items: center; gap: 6px; background: none; border: none; color: var(--accent); font-size: 13px; cursor: pointer; font-family: inherit; margin-top: 20px; padding: 0; }
  .try-again svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>

<nav>
  <a href="/proxysocket" class="nav-logo">
    <div class="nav-logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    </div>
    ProxySocket
  </a>
  <a href="/proxysocket/pay" class="nav-back">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    Buy a plan
  </a>
</nav>

<div class="container">

  <div class="hero">
    <p class="hero-label">Key Recovery</p>
    <h1>Find your license key</h1>
    <p>Enter your email or Pocketfi payment reference — we'll find your license key.</p>
  </div>

  <!-- Lookup form -->
  <div id="lookup-section">
    <div class="lookup-box">
      <p class="lookup-label">Email address or payment reference</p>
      <input type="text" id="email-input" placeholder="your@email.com or PFI|6029631498" onkeydown="if(event.key==='Enter')lookup()">
      <button class="btn-primary" id="lookup-btn" onclick="lookup()">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Find my key
      </button>
      <p class="error-msg" id="error-msg"></p>
    </div>

    <div class="spinner-wrap" id="spinner">
      <div class="spinner"></div>
      <p style="font-size:13px;color:var(--text-muted);">Looking up your key...</p>
    </div>
  </div>

  <!-- Results -->
  <div class="results" id="results-section">
    <p class="results-title" id="results-title">Your license keys</p>
    <div id="keys-list"></div>
    <button class="try-again" onclick="reset()">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Try a different email
    </button>
  </div>

</div>

<script>
  async function lookup() {
    const input = document.getElementById('email-input').value.trim()
    const errEl = document.getElementById('error-msg')
    errEl.style.display = 'none'

    if (!input) {
      errEl.textContent = 'Please enter your email or payment reference'
      errEl.style.display = 'block'
      return
    }

    const isReference = input.startsWith('PFI|') || input.startsWith('PFI%7C')
    const isEmail = input.includes('@')

    if (!isReference && !isEmail) {
      errEl.textContent = 'Enter a valid email or payment reference (e.g. PFI|6029631498)'
      errEl.style.display = 'block'
      return
    }

    const btn = document.getElementById('lookup-btn')
    btn.disabled = true
    document.getElementById('spinner').style.display = 'block'

    try {
      let url, data

      if (isReference) {
        // Lookup by payment reference
        const res = await fetch('/api/license/lookup?ref=' + encodeURIComponent(input))
        data = await res.json()
        document.getElementById('spinner').style.display = 'none'
        if (!res.ok) {
          errEl.textContent = data.error || 'Something went wrong. Please try again.'
          errEl.style.display = 'block'
          btn.disabled = false
          return
        }
        showResults(data.licenses || [], input)
      } else {
        // Lookup by email
        const res = await fetch('/api/license/lookup?email=' + encodeURIComponent(input))
        data = await res.json()
        document.getElementById('spinner').style.display = 'none'
        if (!res.ok) {
          errEl.textContent = data.error || 'Something went wrong. Please try again.'
          errEl.style.display = 'block'
          btn.disabled = false
          return
        }
        showResults(data.licenses || [], input)
      }
    } catch {
      document.getElementById('spinner').style.display = 'none'
      errEl.textContent = 'Network error. Please check your connection.'
      errEl.style.display = 'block'
      btn.disabled = false
    }
  }

  function showResults(licenses, email) {
    document.getElementById('lookup-section').style.display = 'none'
    document.getElementById('results-section').style.display = 'block'

    const list = document.getElementById('keys-list')
    const title = document.getElementById('results-title')

    if (licenses.length === 0) {
      title.style.display = 'none'
      list.innerHTML = `
        <div class="no-keys">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <p>No license keys found for <strong>${email}</strong>.<br><br>
          Check the email you used when paying, or <a href="mailto:hello@deniyitunji.com">contact support</a>.</p>
        </div>`
      return
    }

    title.textContent = licenses.length === 1 ? '1 license key found' : licenses.length + ' license keys found'
    list.innerHTML = licenses.map((l, i) => {
      const expired = new Date(l.expiresAt) < new Date()
      const expiry = new Date(l.expiresAt).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' })
      const plan = l.plan.charAt(0).toUpperCase() + l.plan.slice(1)
      const devices = l.devices || {}
      const deviceList = Object.entries(devices)
      const deviceCount = deviceList.length

      const devicesHTML = deviceList.length > 0 ? `
        <div style="margin-top:14px;border-top:1px solid rgba(255,255,255,0.06);padding-top:14px;">
          <p style="font-size:12px;color:var(--text-muted);margin-bottom:8px;">Active devices (${deviceCount}/2):</p>
          ${deviceList.map(([id, d]) => `
            <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:rgba(255,255,255,0.03);border-radius:8px;margin-bottom:6px;">
              <div>
                <p style="font-size:13px;">${d.name || 'Unknown device'}</p>
                <p style="font-size:11px;color:var(--text-dim);">Last seen: ${d.lastSeen ? new Date(d.lastSeen).toLocaleDateString() : '—'}</p>
              </div>
              <button onclick="removeDevice('${l.key}','${id}')" style="background:rgba(248,81,73,0.1);border:1px solid rgba(248,81,73,0.3);color:#f85149;padding:4px 10px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit;">Remove</button>
            </div>
          `).join('')}
        </div>` : ''

      return `
        <div class="key-card" id="card-${i}">
          <div class="key-card-top">
            <span class="plan-tag">${plan}</span>
            <span class="expiry-tag ${expired ? 'expired' : ''}">${expired ? 'Expired' : 'Expires'} ${expiry}</span>
          </div>
          <p class="key-value ${expired ? 'expired' : ''}">${l.key}</p>
          <button class="copy-btn" id="copy-${i}" onclick="copyKey('${l.key}', ${i})" ${expired ? 'disabled' : ''}>
            <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            <span id="copy-text-${i}">${expired ? 'Expired' : 'Copy key'}</span>
          </button>
          ${devicesHTML}
        </div>`
    }).join('')
  }

  async function removeDevice(key, deviceId) {
    if (!confirm('Remove this device? It will need to re-activate the license key.')) return
    try {
      const res = await fetch('/api/license/validate', {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ key, deviceId }),
      })
      const data = await res.json()
      if (data.success) {
        alert('Device removed. You can now activate on a new device.')
        // Re-run lookup to refresh
        lookup()
      } else {
        alert('Failed to remove device. Try again.')
      }
    } catch {
      alert('Network error. Try again.')
    }
  }

  function copyKey(key, i) {
    navigator.clipboard.writeText(key).then(() => {
      const btn = document.getElementById('copy-' + i)
      const txt = document.getElementById('copy-text-' + i)
      btn.classList.add('copied')
      txt.textContent = 'Copied!'
      setTimeout(() => { btn.classList.remove('copied'); txt.textContent = 'Copy key' }, 2500)
    })
  }

  function reset() {
    document.getElementById('results-section').style.display = 'none'
    document.getElementById('lookup-section').style.display = 'block'
    document.getElementById('lookup-btn').disabled = false
    document.getElementById('email-input').value = ''
    document.getElementById('error-msg').style.display = 'none'
  }
</script>
</body>
</html>
